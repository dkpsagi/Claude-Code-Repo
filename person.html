<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Person Profile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      padding: 40px 32px 60px;
      position: relative;
    }

    .card-header h2 {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-top: -44px;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 4px solid #ffffff;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    .body {
      padding: 16px 32px 32px;
      text-align: center;
    }

    .name {
      font-size: 22px;
      font-weight: 700;
      color: #1e1b4b;
      margin-top: 12px;
    }

    .role {
      font-size: 14px;
      color: #6366f1;
      font-weight: 500;
      margin-top: 4px;
    }

    .bio {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin: 16px 0 24px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      border-top: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 0;
      margin-bottom: 24px;
    }

    .stat-item { text-align: center; }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #1e1b4b;
    }

    .stat-label {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .tag {
      background: #ede9fe;
      color: #6d28d9;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-primary:hover { box-shadow: 0 6px 16px rgba(99, 102, 241, 0.45); }
    .btn-secondary:hover { background: #e2e8f0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h2>Profile</h2>
    </div>

    <div class="avatar-wrap">
      <div class="avatar">👤</div>
    </div>

    <div class="body">
      <div class="name">Alex Morgan</div>
      <div class="role">Senior Product Designer</div>

      <p class="bio">
        Passionate about crafting intuitive digital experiences.
        Bridging the gap between design and engineering for over 8 years.
      </p>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-value">128</div>
          <div class="stat-label">Projects</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">4.9</div>
          <div class="stat-label">Rating</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">2.4k</div>
          <div class="stat-label">Followers</div>
        </div>
      </div>

      <div class="tags">
        <span class="tag">UI/UX</span>
        <span class="tag">Figma</span>
        <span class="tag">Design Systems</span>
        <span class="tag">Prototyping</span>
        <span class="tag">React</span>
      </div>

      <div class="actions">
        <button class="btn btn-primary">Follow</button>
        <button class="btn btn-secondary">Message</button>
      </div>
    </div>
  </div>
</body>
</html>
